{% extends "base.html" %}

{% block title %}근무응원 - 근무 관리 시스템{% endblock %}

{% block extra_head %}
<link rel="prefetch" href="{{ url_for('calendar_view', year=year, month=month) }}">
{% endblock %}

{% block content %}
<div class="work-thanks-container">
    <div class="thanks-content">
        <div class="thanks-emoji">
            <div class="thumbs-up">👍</div>
            <div class="stars">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
            </div>
        </div>
        
        <div class="thanks-message">
            <h2>{{ session.get('name', '') }} 기사님, 감사합니다!</h2>
            <p>오늘도 좋은 하루 되세요!</p>
        </div>
        
        <div class="auto-redirect">
            <span id="countdown">2</span>초 후, 메인화면으로 돌아갑니다.
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    var url = "{{ url_for('calendar_view', year=year, month=month) }}";
    var countdown = 2;
    var el = document.getElementById('countdown');
    var timer = setInterval(function() {
        countdown--;
        if (el) el.textContent = countdown;
        if (countdown <= 0) {
            clearInterval(timer);
            window.location.replace(url);
        }
    }, 1000);
})();
</script>
{% endblock %}
