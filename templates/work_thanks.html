{% extends "base.html" %}

{% block title %}근무응원 - 근무 관리 시스템{% endblock %}

{% block extra_head %}
<link rel="prefetch" href="{{ url_for('calendar_view', year=year, month=month) }}">
{% endblock %}

{% block content %}
<div class="work-thanks-container">
    <div class="thanks-content">
        <div class="thanks-emoji">
            <div class="thumbs-up">👍</div>
            <div class="stars">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
            </div>
        </div>
        
        <div class="thanks-message">
            <h2>{{ session.get('name', '') }} 기사님, 감사합니다!</h2>
            <p>오늘도 좋은 하루 되세요!</p>
        </div>
        
        <div class="auto-redirect">
            잠시 후, 메인화면으로 돌아갑니다.
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function() {
    var url = "{{ url_for('calendar_view', year=year, month=month) }}";

    // 브라우저에 다음 페이지를 미리 받아오도록 힌트
    var link = document.createElement('link');
    link.rel = 'prefetch';
    link.href = url;
    document.head.appendChild(link);

    // 1초만 감사 페이지를 보여준 뒤 즉시 이동
    setTimeout(function() {
        window.location.replace(url);
    }, 1000);
})();
</script>
{% endblock %}
